<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics – {{ url.short_code }}</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>📊 Click Analytics</h1>
      <p>Tracking data for your shortened link</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-number">{{ url.click_count }}</span>
        <span class="stat-label">Total Clicks</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">{{ url.short_code }}</span>
        <span class="stat-label">Short Code</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">
          {{ url.created_at[:10] }}
        </span>
        <span class="stat-label">Created On</span>
      </div>
    </div>

    <!-- Original URL -->
    <div class="card">
      <p class="label">Original URL:</p>
      <a href="{{ url.original }}" target="_blank" class="original-url">
        {{ url.original }}
      </a>
    </div>

    <!-- Chart -->
    <div class="card">
      <h3>Clicks Over Time</h3>
      <canvas id="clickChart"></canvas>
      <p id="noData" class="no-data hidden">
        No click data yet. Share your link!
      </p>
    </div>

    <a href="/" class="back-btn">← Shorten Another URL</a>

  </div>

  <script>
    const code = "{{ url.short_code }}";

    fetch(`/api/analytics/${code}`)
      .then(res => res.json())
      .then(data => {
        if (data.labels.length === 0) {
          document.getElementById("noData").classList.remove("hidden");
          return;
        }

        const ctx = document.getElementById("clickChart").getContext("2d");
        new Chart(ctx, {
          type: "line",
          data: {
            labels: data.labels,
            datasets: [{
              label: "Clicks per Day",
              data: data.values,
              borderColor: "#6c63ff",
              backgroundColor: "rgba(108, 99, 255, 0.1)",
              borderWidth: 3,
              pointBackgroundColor: "#6c63ff",
              pointRadius: 5,
              tension: 0.4,
              fill: true
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              tooltip: { mode: "index" }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { stepSize: 1 }
              }
            }
          }
        });
      });
  </script>

</body>
</html>
